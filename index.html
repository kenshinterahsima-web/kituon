<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kituon | ヒントを探す</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Kituon</h1>
        <nav class="nav">
          <a class="nav-link active" href="./index.html">ヒントを探す</a>
          <a class="nav-link" href="./saved.html">保存</a>
          <a class="nav-link" href="./submit.html">体験を投稿する</a>
        </nav>
      </div>
    </header>

    <main class="container page page--home">
      <section class="card card--filters">
        <h3>絞り込み</h3>
        <div class="filters">
          <label class="field">
            <span>場面</span>
            <select id="filterSituation">
              <option value="">すべて</option>
            </select>
          </label>
          <label class="field">
            <span>吃音のタイプ</span>
            <select id="filterType">
              <option value="">すべて</option>
            </select>
          </label>
          <label class="field">
            <span>効果</span>
            <select id="filterEffect">
              <option value="">すべて</option>
            </select>
          </label>
          <label class="field">
            <span>並び替え</span>
            <select id="sortOrder">
              <option value="newest">新しい順</option>
              <option value="oldest">古い順</option>
              <option value="effect_desc">効果が高い順</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card card--main" id="tips">
        <div class="list-header">
          <h3>投稿一覧</h3>
          <button id="reloadButton" class="button button-secondary" type="button">
            再読み込み
          </button>
        </div>
        <p id="statusMessage" class="status-message" aria-live="polite"></p>
        <div id="tipsList" class="tips-list"></div>
        <div class="pagination">
          <button id="prevPageButton" class="button button-secondary" type="button">
            前へ
          </button>
          <span id="pageInfo" class="page-info">1 / 1</span>
          <button id="nextPageButton" class="button button-secondary" type="button">
            次へ
          </button>
        </div>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script type="module" src="./js/list.js"></script>
  </body>
</html>
